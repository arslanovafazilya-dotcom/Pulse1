<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Stats</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="container">

    <h1>Анонимная статистика эмоций 📊</h1>

    <div class="buttons">
      <button onclick="vote('joy')">Радость</button>
      <button onclick="vote('calm')">Спокойствие</button>
      <button onclick="vote('sad')">Грусть</button>
      <button onclick="vote('anger')">Гнев</button>
    </div>

    <div class="chart">

      <div class="bar">
        <span>Радость</span>
        <div class="line"><div id="joyBar"></div></div>
        <span id="joyText">0%</span>
      </div>

      <div class="bar">
        <span>Спокойствие</span>
        <div class="line"><div id="calmBar"></div></div>
        <span id="calmText">0%</span>
      </div>

      <div class="bar">
        <span>Грусть</span>
        <div class="line"><div id="sadBar"></div></div>
        <span id="sadText">0%</span>
      </div>

      <div class="bar">
        <span>Гнев</span>
        <div class="line"><div id="angerBar"></div></div>
        <span id="angerText">0%</span>
      </div>

    </div>

    <a class="insta" href="https://instagram.com" target="_blank">
      Instagram
    </a>

  </div>

  <script src="script.js"></script>
</body>
</html>
